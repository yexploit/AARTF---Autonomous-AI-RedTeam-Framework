name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check entrypoints
        run: |
          python -m py_compile aartf.py gui_dashboard.py

      - name: Syntax check project packages
        run: |
          python -c "import pathlib, py_compile; files=[p for p in pathlib.Path('.').rglob('*.py') if '.venv' not in p.parts and '__pycache__' not in p.parts]; [py_compile.compile(str(f), doraise=True) for f in files]; print(f'Checked {len(files)} files')"
